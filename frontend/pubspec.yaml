name: careerpath
description: A career guidance platform for secondary education students built with Flutter.
publish_to: 'none'

version: 1.0.0+1

environment:
  sdk: '>=3.0.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter

  # HTTP & Networking
  http: ^1.1.0
  dio: ^5.3.0

  # State Management
  provider: ^6.0.0
  riverpod: ^2.4.0
  flutter_riverpod: ^2.4.0

  # Navigation & Routing
  go_router: ^10.0.0

  # Local Storage
  shared_preferences: ^2.2.0
  hive: ^2.2.0
  hive_flutter: ^1.1.0

  # JSON Serialization
  json_serializable: ^6.7.0
  json_annotation: ^4.8.0

  # Authentication
  jwt_decoder: ^2.0.1
  google_sign_in: ^6.1.0

  # UI Components
  flutter_svg: ^2.0.0
  intl: ^0.19.0
  cached_network_image: ^3.3.0

  # Date & Time
  timeago: ^3.6.0

  # Charts & Graphs
  fl_chart: ^0.63.0
  charts_flutter: ^0.12.0

  # File Handling
  file_picker: ^5.3.0
  image_picker: ^0.8.7
  permission_handler: ^11.4.0

  # PDF Generation
  pdf: ^3.10.0
  printing: ^5.11.0

  # Notifications
  firebase_core: ^2.21.0
  firebase_messaging: ^14.6.0

  # Utils
  get: ^4.6.0
  logger: ^2.0.0
  connectivity_plus: ^5.0.0

dev_dependencies:
  flutter_test:
    sdk: flutter

  flutter_lints: ^2.0.0
  build_runner: ^2.4.0
  json_serializable: ^6.7.0

flutter:
  uses-material-design: true

  assets:
    - assets/images/
    - assets/icons/
    - assets/fonts/

  fonts:
    - family: Poppins
      fonts:
        - asset: assets/fonts/Poppins-Regular.ttf
        - asset: assets/fonts/Poppins-Bold.ttf
          weight: 700
        - asset: assets/fonts/Poppins-Medium.ttf
          weight: 500
    - family: Inter
      fonts:
        - asset: assets/fonts/Inter-Regular.ttf
        - asset: assets/fonts/Inter-Bold.ttf
          weight: 700